openapi: 3.0.3
info:
  title: Agentic Content Studio API
  version: 1.0.0
  description: 智能内容运营平台 API，覆盖账号、选题、内容、Agent、审核、发布和数据复盘主流程。

servers:
  - url: http://localhost:3001/api
    description: 本地 API 服务

tags:
  - name: Auth
  - name: Dashboard
  - name: Accounts
  - name: AccountProfiles
  - name: Topics
  - name: Contents
  - name: Versions
  - name: Materials
  - name: IMA
  - name: Agents
  - name: AgentRuns
  - name: Prompts
  - name: Reviews
  - name: Publishing
  - name: Analytics
  - name: MaterialLibrary
  - name: Integration
  - name: Settings
  - name: Users

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    ContentIdPath:
      name: contentId
      in: path
      required: true
      schema:
        type: string
    VersionIdPath:
      name: versionId
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20

  responses:
    Ok:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

  schemas:
    ApiResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true

    PageResult:
      type: object
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    UserRole:
      type: string
      enum: [ADMIN, OPERATOR, REVIEWER, ANALYST]
    Platform:
      type: string
      enum: [WECHAT, XIAOHONGSHU, DOUYIN, VIDEO_CHANNEL, BILIBILI, ZHIHU, OTHER]
    ContentStatus:
      type: string
      enum: [DRAFT, PENDING_GENERATE, GENERATING, PENDING_REVIEW, REJECTED, APPROVED, PENDING_PUBLISH, PUBLISHING, PUBLISHED, FAILED, REVIEWED, ARCHIVED]
    AgentType:
      type: string
      enum: [TITLE, TAG, REWRITE, BODY, COVER_COPY, REVIEW, SUMMARY, TOPIC, IMAGE, VIDEO_SCRIPT, COMPETITOR]
    RunStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCESS, FAILED]
    ReviewStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    PublishStatus:
      type: string
      enum: [PENDING, PUBLISHING, SUCCESS, FAILED, CANCELLED]
    MaterialType:
      type: string
      enum: [IMAGE, VIDEO, AUDIO, FILE]
    MaterialRole:
      type: string
      enum: [COVER, BODY, ATTACHMENT]
    MaterialAssetStatus:
      type: string
      enum: [ENABLED, REVIEWING, DISABLED]

    UserPublic:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponseData:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'

    PlatformAccount:
      type: object
      properties:
        id:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        accountName:
          type: string
        accountType:
          type: string
          nullable: true
        authStatus:
          type: string
        ownerId:
          type: string
        rawData:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountProfile:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        positioning:
          type: string
          nullable: true
        targetAudience:
          type: object
          nullable: true
          additionalProperties: true
        contentStyle:
          type: string
          nullable: true
        titlePreference:
          type: string
          nullable: true
        coverPreference:
          type: string
          nullable: true
        tone:
          type: string
          nullable: true
        forbiddenWords:
          type: array
          nullable: true
          items:
            type: string
        contentBoundary:
          type: string
          nullable: true
        publishStrategy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountProfileUpsert:
      type: object
      properties:
        positioning:
          type: string
        targetAudience:
          type: object
          additionalProperties: true
        contentStyle:
          type: string
        titlePreference:
          type: string
        coverPreference:
          type: string
        tone:
          type: string
        forbiddenWords:
          type: array
          items:
            type: string
        contentBoundary:
          type: string
        publishStrategy:
          type: string

    Topic:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        source:
          type: string
        targetPlatforms:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Platform'
        status:
          $ref: '#/components/schemas/ContentStatus'
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TopicCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        targetPlatforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
        source:
          type: string
          default: manual

    Content:
      type: object
      properties:
        id:
          type: string
        topicId:
          type: string
          nullable: true
        title:
          type: string
        summary:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        coverText:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ContentStatus'
        aiGenerated:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContentCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        topicId:
          type: string
        summary:
          type: string

    ContentPatch:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        body:
          type: string
        coverText:
          type: string
        status:
          $ref: '#/components/schemas/ContentStatus'

    ContentGenerate:
      type: object
      properties:
        accountId:
          type: string
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'

    ContentVersion:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        accountId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        coverText:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        formatConfig:
          type: object
          nullable: true
          additionalProperties: true
        status:
          $ref: '#/components/schemas/ContentStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContentVersionPatch:
      type: object
      properties:
        accountId:
          type: string
        title:
          type: string
        body:
          type: string
        coverText:
          type: string
        tags:
          type: array
          items:
            type: string
        formatConfig:
          type: object
          additionalProperties: true
        status:
          $ref: '#/components/schemas/ContentStatus'

    VersionsGenerate:
      type: object
      required: [platforms]
      properties:
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
        accountIds:
          type: array
          items:
            type: string

    Material:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        type:
          $ref: '#/components/schemas/MaterialType'
        role:
          $ref: '#/components/schemas/MaterialRole'
        name:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        localPath:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        meta:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MaterialInput:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/MaterialType'
        role:
          $ref: '#/components/schemas/MaterialRole'
        name:
          type: string
        url:
          type: string
        localPath:
          type: string
        source:
          type: string
        meta:
          type: object
          additionalProperties: true

    Prompt:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        agentType:
          $ref: '#/components/schemas/AgentType'
        version:
          type: string
        template:
          type: string
        variables:
          type: object
          nullable: true
          additionalProperties: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PromptCreate:
      type: object
      required: [name, agentType, template]
      properties:
        name:
          type: string
        agentType:
          $ref: '#/components/schemas/AgentType'
        template:
          type: string
        version:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/AgentType'
        description:
          type: string
          nullable: true
        promptId:
          type: string
        model:
          type: string
        enabled:
          type: boolean
        config:
          type: object
          nullable: true
          additionalProperties: true
        prompt:
          $ref: '#/components/schemas/Prompt'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgentRun:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        contentId:
          type: string
        versionId:
          type: string
          nullable: true
        input:
          type: object
          nullable: true
          additionalProperties: true
        output:
          type: object
          nullable: true
          additionalProperties: true
        model:
          type: string
          nullable: true
        promptVersion:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/RunStatus'
        error:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          nullable: true
          description: 执行耗时（毫秒），规划字段，V1.1 实现
        agent:
          $ref: '#/components/schemas/Agent'
        content:
          $ref: '#/components/schemas/Content'
        version:
          $ref: '#/components/schemas/ContentVersion'

    AgentBodyRun:
      type: object
      required: [contentId]
      properties:
        contentId:
          type: string
        accountId:
          type: string

    AgentTitleRun:
      type: object
      required: [contentId]
      properties:
        contentId:
          type: string
        accountId:
          type: string
        count:
          type: integer

    AgentRewriteRun:
      type: object
      required: [contentId, platform]
      properties:
        contentId:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        accountId:
          type: string

    AgentReviewRun:
      type: object
      required: [versionId]
      properties:
        versionId:
          type: string

    ImaConfigPublic:
      type: object
      properties:
        clientId:
          type: string
          nullable: true
        baseUrl:
          type: string
          nullable: true
        useMock:
          type: boolean
        hasApiKey:
          type: boolean

    ImaConfigUpdate:
      type: object
      properties:
        clientId:
          type: string
        apiKey:
          type: string
        baseUrl:
          type: string
        useMock:
          type: boolean

    ImaKnowledgeBase:
      type: object
      properties:
        id:
          type: string
        externalId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        isDefault:
          type: boolean
        rawData:
          type: object
          nullable: true
          additionalProperties: true
        syncedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImaSearch:
      type: object
      required: [query, contentId]
      properties:
        query:
          type: string
        contentId:
          type: string
        limit:
          type: integer
        knowledgeBaseId:
          type: string

    ReviewTask:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        versionId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ReviewStatus'
        reviewerId:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    ReviewCreate:
      type: object
      required: [contentId]
      properties:
        contentId:
          type: string
        versionId:
          type: string

    ReviewReject:
      type: object
      properties:
        comment:
          type: string

    PublishingTask:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        versionId:
          type: string
        accountId:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        status:
          $ref: '#/components/schemas/PublishStatus'
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        content:
          $ref: '#/components/schemas/Content'
        version:
          $ref: '#/components/schemas/ContentVersion'
        account:
          $ref: '#/components/schemas/PlatformAccount'
        publishRecord:
          $ref: '#/components/schemas/PublishRecord'

    PublishingSummary:
      type: object
      description: 发布管理页统计卡，规划字段
      properties:
        pendingCount:
          type: integer
        draftSyncCount:
          type: integer
        packageRedCount:
          type: integer
        packageDouyinCount:
          type: integer
        publishedTodayCount:
          type: integer

    PublishingTaskCreate:
      type: object
      required: [versionId, accountId]
      properties:
        versionId:
          type: string
        accountId:
          type: string
        scheduledAt:
          type: string
          format: date-time
          nullable: true

    PublishRecord:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        accountId:
          type: string
        externalPostId:
          type: string
          nullable: true
        externalUrl:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PublishStatus'
        rawResult:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AnalyticsData:
      type: object
      properties:
        id:
          type: string
        publishRecordId:
          type: string
        contentId:
          type: string
        versionId:
          type: string
          nullable: true
        platform:
          $ref: '#/components/schemas/Platform'
        accountId:
          type: string
        views:
          type: integer
        likes:
          type: integer
        comments:
          type: integer
        shares:
          type: integer
        collects:
          type: integer
        followersDelta:
          type: integer
        rawData:
          type: object
          nullable: true
          additionalProperties: true
        collectedAt:
          type: string
          format: date-time

    AnalyticsReport:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        reportType:
          type: string
        summary:
          type: string
          nullable: true
        insights:
          type: object
          nullable: true
          additionalProperties: true
        suggestions:
          type: object
          nullable: true
          additionalProperties: true
        createdByAgent:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AnalyticsSync:
      type: object
      required: [publishRecordId]
      properties:
        publishRecordId:
          type: string

    ReportGenerate:
      type: object
      required: [contentId]
      properties:
        contentId:
          type: string

    DashboardStats:
      type: object
      description: V1 已实现扁平计数；alerts / publishedWeek 为 V1.1 规划
      required:
        - pendingGenerate
        - generating
        - pendingReview
        - pendingPublish
        - publishedTotal
        - reviewed
      properties:
        pendingGenerate:
          type: integer
          description: 待生成（DRAFT + PENDING_GENERATE）
        generating:
          type: integer
          description: 生成中
        pendingReview:
          type: integer
          description: 待审核
        pendingPublish:
          type: integer
          description: 待发布（APPROVED + PENDING_PUBLISH）
        publishedTotal:
          type: integer
          description: 已发布（PUBLISHED + PUBLISHING）
        reviewed:
          type: integer
          description: 已审核通过待后续流转
        publishedWeek:
          type: integer
          description: 本周已发布，V1.1 规划
        alerts:
          type: array
          description: 工作台告警，V1.1 规划
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                enum: [risk, agent, account]
              title:
                type: string
              message:
                type: string
              severity:
                type: string
                enum: [info, warning, error]

    DashboardAlert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [risk, agent, account]
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [info, warning, error]

    MaterialAsset:
      type: object
      description: 独立素材库资产（P1 规划）
      properties:
        id:
          type: string
        name:
          type: string
        fileName:
          type: string
        type:
          $ref: '#/components/schemas/MaterialType'
        format:
          type: string
          description: 如 JPG、MP4
        sizeBytes:
          type: integer
        url:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          nullable: true
        uploaderId:
          type: string
        uploader:
          $ref: '#/components/schemas/UserPublic'
        status:
          $ref: '#/components/schemas/MaterialAssetStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MaterialAssetCreate:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/MaterialType'
        format:
          type: string
        sizeBytes:
          type: integer
        url:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string

    MaterialAssetPatch:
      type: object
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
        status:
          $ref: '#/components/schemas/MaterialAssetStatus'

    MaterialLibraryStats:
      type: object
      properties:
        total:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer

    ContentMaterialLink:
      type: object
      properties:
        id:
          type: string
        contentId:
          type: string
        assetId:
          type: string
        role:
          $ref: '#/components/schemas/MaterialRole'
        asset:
          $ref: '#/components/schemas/MaterialAsset'

    ContentMaterialLinkCreate:
      type: object
      properties:
        assetId:
          type: string
          description: 关联已有素材库资产
        role:
          $ref: '#/components/schemas/MaterialRole'
        type:
          $ref: '#/components/schemas/MaterialType'
        name:
          type: string
        url:
          type: string
        localPath:
          type: string
        source:
          type: string

    IntegrationApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
          description: 脱敏前缀，如 acs_live_abc***
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true

    IntegrationApiKeyCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    IntegrationApiKeyCreateResponse:
      type: object
      properties:
        apiKey:
          $ref: '#/components/schemas/IntegrationApiKey'
        plainTextKey:
          type: string
          description: 仅创建时返回一次明文

    IntegrationWebhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        secret:
          type: string
          nullable: true
          description: 响应脱敏

    IntegrationWebhookUpsert:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        secret:
          type: string

    IntegrationAccessLog:
      type: object
      properties:
        id:
          type: string
        apiKeyId:
          type: string
        apiKeyPrefix:
          type: string
        method:
          type: string
        path:
          type: string
        statusCode:
          type: integer
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time

    IntegrationStatus:
      type: object
      properties:
        healthy:
          type: boolean
        rateLimitPerMinute:
          type: integer
        requestsLast24h:
          type: integer
        errorRateLast24h:
          type: number

    SystemSetting:
      type: object
      properties:
        key:
          type: string
        value:
          type: object
          additionalProperties: true
        description:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time

    SystemSettingUpdate:
      type: object
      required: [value]
      properties:
        value:
          type: object
          additionalProperties: true

    UserCreate:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    UserPatch:
      type: object
      properties:
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        disabled:
          type: boolean

    AccountCreate:
      type: object
      required: [platform, accountName]
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
        accountName:
          type: string
        accountType:
          type: string
        ownerId:
          type: string

    ReviewStats:
      type: object
      description: 审核中心汇总，规划字段
      properties:
        pending:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer

    AnalyticsOverview:
      type: object
      description: 数据复盘页概览，规划字段
      properties:
        views:
          type: integer
        likes:
          type: integer
        comments:
          type: integer
        shares:
          type: integer
        collects:
          type: integer
        topContents:
          type: array
          items:
            type: object
            properties:
              contentId:
                type: string
              title:
                type: string
              platform:
                $ref: '#/components/schemas/Platform'
              views:
                type: integer
              interactions:
                type: integer

